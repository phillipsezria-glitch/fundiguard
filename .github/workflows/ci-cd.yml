name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Build frontend
        run: npm run build

      - name: Check TypeScript
        run: npx tsc --noEmit
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    needs: lint-and-build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
        continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run npm audit
        run: npm audit --production
        continue-on-error: true

      - name: Report vulnerabilities
        if: failure()
        run: echo "⚠️ Security vulnerabilities detected. Review npm audit output."

  deploy-edge-functions:
    runs-on: ubuntu-latest
    needs: [lint-and-build, test, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        run: npm install -g @supabase/cli

      - name: Deploy Edge Functions
        run: supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: mbudwsejaucyauthctpo

      - name: Notify deployment status
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Edge Functions deployed successfully!"
          else
            echo "❌ Edge Functions deployment failed!"
          fi

  deploy-vercel:
    runs-on: ubuntu-latest
    needs: [lint-and-build, test, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: vercel/action@master
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

      - name: Notify deployment status
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Frontend deployed to Vercel successfully!"
          else
            echo "❌ Vercel deployment failed!"
          fi

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-edge-functions, deploy-vercel]
    if: always()
    
    steps:
      - name: Deployment Complete
        run: |
          echo "🎉 CI/CD Pipeline Complete!"
          echo "Check your deployments:"
          echo "  Frontend: https://fundiguard.ke"
          echo "  Edge Functions: https://mbudwsejaucyauthctpo.supabase.co/functions/v1"
