name: Deploy Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase.json'
      - '.github/workflows/deploy-edge-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Supabase CLI
        run: npm install -g @supabase/cli

      - name: Deploy Edge Functions
        run: supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: mbudwsejaucyauthctpo

      - name: Deployment Success
        if: success()
        run: |
          echo "✅ Edge Functions deployed successfully!"
          echo "Functions deployed:"
          echo "  - Auth: https://mbudwsejaucyauthctpo.supabase.co/functions/v1/auth"
          echo "  - Jobs: https://mbudwsejaucyauthctpo.supabase.co/functions/v1/jobs"
          echo "  - Bids: https://mbudwsejaucyauthctpo.supabase.co/functions/v1/bids"

      - name: Deployment Failed
        if: failure()
        run: echo "❌ Edge Functions deployment failed. Check logs above."
